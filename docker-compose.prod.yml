# Surcouche de PRODUCTION (durcissement).
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Par rapport au dev :
#  - db & redis ne sont PLUS exposés sur l'hôte (accès réseau interne uniquement) ;
#  - Redis exige un mot de passe (--requirepass) ;
#  - l'API tourne sur l'image construite (pas de montage du code, pas de --reload),
#    ENVIRONMENT=production → /docs, /redoc, /openapi.json désactivés ;
#  - le dashboard est servi en build de production (Next standalone) ;
#  - un reverse-proxy Caddy termine le TLS et est le SEUL service exposé (80/443).
#
# Variables requises dans .env : DOMAIN, REDIS_PASSWORD, POSTGRES_* , JWT_SECRET.
# Nécessite Docker Compose ≥ 2.24 (tag de fusion !override).
name: guardianops

services:
  db:
    ports: !override []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER requis en production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis en production}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB requis en production}

  redis:
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD requis en production}"]
    ports: !override []
    # Le secret est passé par `REDISCLI_AUTH` (lu nativement par redis-cli) et NON en argument `-a`
    # de la sonde : la sonde ci-dessous passe par un shell, et un mot de passe contenant un
    # guillemet ou une espace y casserait le quoting — la sonde échouerait alors TOUJOURS et
    # bloquerait `depends_on: service_healthy`, donc le déploiement. Effet de bord utile : le
    # secret ne figure plus dans la ligne de commande du healthcheck.
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:?REDIS_PASSWORD requis en production}
    healthcheck:
      # Sonde d'ÉCRITURE jugée sur la SORTIE, pas `ping` jugé sur le code de sortie. Mesuré sur
      # `redis-cli 7.4.9` : le client ne traduit JAMAIS une erreur applicative en code de sortie
      # (rc=0 sur `NOAUTH`, sur `WRONGPASS` et sur `OOM command not allowed`) et il poursuit après
      # un échec d'authentification. Un `ping` jugé par `$?` ne peut donc virer au rouge que si le
      # serveur est injoignable en TCP. Deux pannes réelles passaient au vert :
      #   1. `REDIS_PASSWORD` tourné sans recréer les deux côtés ⇒ l'api prend `NOAUTH` et meurt,
      #      le conteneur redis reste `healthy` ;
      #   2. saturation mémoire ⇒ `PING` répond `PONG` (l'OOM ne refuse que les ÉCRITURES).
      # Vérifié par MUTATION : sur un serveur au mot de passe désynchronisé, l'ancienne sonde reste
      # `healthy` là où celle-ci passe `unhealthy`. `grep -qx` évite un `$` que Compose interpolerait.
      # La clé porte un TTL : évincable, jamais un poison pill sous une politique `volatile-*`.
      test: ["CMD-SHELL", "redis-cli set __healthcheck__ 1 EX 30 | grep -qx OK"]
      interval: 5s
      timeout: 3s
      retries: 10

  go-api:
    # Pas de montage du code source, pas de --reload (image immuable).
    # Nombre de workers configurable via API_WORKERS (défaut 2). Sûr car l'API
    # est sans état : la tâche périodique vit dans le service `scheduler`.
    # --proxy-headers + --forwarded-allow-ips='*' : fait confiance au X-Forwarded-For posé par
    # Caddy (seul service en amont sur ce réseau docker, `go-api` n'a aucun port publié sur l'hôte)
    # pour que request.client.host reflète la VRAIE IP cliente — sinon le rate-limiter de login
    # (app/core/ratelimit.py) verrait toujours l'IP interne de Caddy et confondrait tous les
    # clients dans la même clé de quota (bypass total du rate-limit une fois l'API exposée).
    volumes: !override []
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "${API_WORKERS:-2}", "--proxy-headers", "--forwarded-allow-ips=*"]
    ports: !override []
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CORS_ORIGINS: https://${DOMAIN:?DOMAIN requis en production}

  # Scheduler : instance unique (ne pas répliquer), durci comme l'API.
  scheduler:
    volumes: !override []
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0

  go-web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
      # NEXT_PUBLIC_* est inliné au BUILD par Next.js — un simple `environment:` runtime
      # (ci-dessous) n'a aucun effet sur le bundle déjà figé, doit transiter en build-arg.
      args:
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
    volumes: !override []
    ports: !override []
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.${DOMAIN}

  proxy:
    image: caddy:2-alpine
    container_name: guardianops-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - go-api
      - go-web

volumes:
  caddy_data:
  caddy_config:
