# Surcouche TEMPORAIRE : déployer via l'IP publique du serveur, avant que le DNS soit posé.
#
#   DOMAIN=<IP_du_serveur> docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#                                          -f docker-compose.prod-ip.yml up -d --build
#
# `DOMAIN` porte ici l'IP (réutilisé tel quel — pas de nouvelle variable), TLS auto-signé
# (pas de Let's Encrypt possible sans domaine résolvable, cf. infra/caddy/Caddyfile.ip).
#
# DASHBOARD_PORT/API_PORT (défaut 443/8443) : à surcharger dans .env si 80/443 sont déjà pris
# par un autre service sur le même hôte (déploiement co-hébergé, ex. avec SGI sur le même VPS) —
# ex. DASHBOARD_PORT=8443 / API_PORT=9443.
#
# Bascule vers le domaine réel dès que le DNS est prêt : retirer cette surcouche de la
# commande, définir DOMAIN=<domaine réel> dans .env, relancer — Let's Encrypt automatique
# prend le relais via le Caddyfile normal (docker-compose.prod.yml). Aucun autre changement.
name: guardianops

services:
  go-web:
    build:
      # NEXT_PUBLIC_* est inliné au BUILD par Next.js — le `environment:` runtime ci-dessous
      # n'a aucun effet sur le bundle déjà figé (même bug que côté domaine, docker-compose.prod.yml).
      args:
        # Le Caddyfile normal sépare dashboard/API par sous-domaine (api.{$DOMAIN}) ; une IP
        # nue ne supporte pas les sous-domaines → distinction par port (cf. Caddyfile.ip).
        NEXT_PUBLIC_API_URL: https://${DOMAIN}:${API_PORT:-8443}
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN}:${API_PORT:-8443}

  proxy:
    ports: !override
      - "${DASHBOARD_PORT:-443}:${DASHBOARD_PORT:-443}"
      - "${API_PORT:-8443}:${API_PORT:-8443}"
    environment:
      DASHBOARD_PORT: ${DASHBOARD_PORT:-443}
      API_PORT: ${API_PORT:-8443}
    volumes: !override
      - ./infra/caddy/Caddyfile.ip:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
