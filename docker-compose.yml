name: guardianops

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: guardianops-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-guardian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guardian}
      POSTGRES_DB: ${POSTGRES_DB:-guardianops}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-guardian} -d ${POSTGRES_DB:-guardianops}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: guardianops-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Nom de service `go-api` (pas `api`) : Docker enregistre TOUJOURS le nom de service brut comme
  # DNS sur tout réseau rejoint, y compris un réseau externe partagé (`caddy_net`, cf.
  # docker-compose.prod-fronted.yml) — un simple alias ne suffit pas à éviter la collision avec
  # les propres services `api`/`web` d'un autre projet co-hébergé (incident 2026-07-11 : ça a
  # cassé la résolution `api` côté SGI). `go-api` élimine la classe de bug, pas juste ce cas précis.
  go-api:
    build:
      context: ./apps/api
    container_name: guardianops-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-guardian}:${POSTGRES_PASSWORD:-guardian}@db:5432/${POSTGRES_DB:-guardianops}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_PORT:-8800}:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Planificateur : détection des machines offline (instance unique).
  # Même image que l'API, commande différente. Permet de scaler l'API sans
  # dupliquer la tâche périodique. NE PAS répliquer ce service.
  scheduler:
    build:
      context: ./apps/api
    container_name: guardianops-scheduler
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-guardian}:${POSTGRES_PASSWORD:-guardian}@db:5432/${POSTGRES_DB:-guardianops}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./apps/api:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Nom de service `go-web` (pas `web`) : même raison que `go-api` ci-dessus.
  go-web:
    build:
      context: ./apps/web
    container_name: guardianops-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8800}
      # Identifiants de démo pré-remplis dans le formulaire de login (dev uniquement).
      NEXT_PUBLIC_DEMO_EMAIL: demo@guardianops.ai
      NEXT_PUBLIC_DEMO_PASSWORD: demo1234
      # Version affichée sur la page de login.
      NEXT_PUBLIC_APP_VERSION: 0.1.0
    ports:
      - "${WEB_PORT:-3300}:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - go-api

  # Agent Rust — démarrage optionnel via le profil "agent" :
  #   docker compose --profile agent up agent --build
  # Prérequis : agent/data/agent.toml renseigné (cf. docs/runbook.md).
  # Sur le réseau Compose l'API est joignable à http://go-api:8000.
  agent:
    build:
      context: ./agent
    container_name: guardianops-agent
    profiles: ["agent"]
    restart: unless-stopped
    volumes:
      - ./agent/data:/agent
    depends_on:
      - go-api

volumes:
  db_data:
