name: CI

on:
  push:
    branches: [main]
  pull_request:

# Annule les runs précédents d'une même branche/PR encore en cours.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (ruff · migrations · pytest)
    runs-on: ubuntu-latest
    services:
      db:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: guardian
          POSTGRES_PASSWORD: guardian
          POSTGRES_DB: guardianops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U guardian -d guardianops"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://guardian:guardian@localhost:5432/guardianops
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret-which-is-definitely-over-32-chars
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Migrations (alembic upgrade head)
        run: alembic upgrade head
      - name: Tests (pytest)
        run: pytest -q

  web:
    name: Web (lint · typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Typecheck (tsc)
        run: npx tsc --noEmit
      - name: Build (next build)
        run: npm run build

  agent:
    name: Agent (fmt · clippy · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - name: Format (rustfmt)
        run: cargo fmt --check
      - name: Lint (clippy)
        run: cargo clippy --all-targets -- -D warnings
      - name: Build (release)
        run: cargo build --release
